<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 64" width="228" height="64" role="img" aria-label="Exotic Push Engine">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&amp;display=swap');</style>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="cap">
      <circle cx="32" cy="32" r="29"/>
    </clipPath>
  </defs>

  <!-- Icon: dark charcoal circle -->
  <circle cx="32" cy="32" r="30" fill="#1C1917"/>

  <g clip-path="url(#cap)">
    <rect x="4" y="19"   width="40" height="2.5" rx="1.25" fill="url(#trail)" opacity="0.30"/>
    <rect x="4" y="14"   width="26" height="1.5" rx="0.75" fill="url(#trail)" opacity="0.13"/>
    <rect x="4" y="42.5" width="40" height="2.5" rx="1.25" fill="url(#trail)" opacity="0.30"/>
    <rect x="4" y="48"   width="26" height="1.5" rx="0.75" fill="url(#trail)" opacity="0.13"/>

    <path d="M 16,25 A 7,7 0 0,0 16,39 L 44,39 L 55,32 L 44,25 Z" fill="#EA580C"/>

    <line x1="17" y1="30"   x2="38" y2="30"   stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.92"/>
    <line x1="17" y1="35.5" x2="29" y2="35.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Wordmark: light background version -->
  <text
    x="74" y="36"
    font-family="Montserrat, sans-serif"
    font-weight="700"
    font-size="23"
    letter-spacing="-0.4"
    fill="#1C1917">exotic</text>

  <text
    x="75" y="52"
    font-family="Montserrat, sans-serif"
    font-weight="500"
    font-size="11"
    letter-spacing="3.2"
    fill="#A8A29E">PUSH ENGINE</text>
</svg>
